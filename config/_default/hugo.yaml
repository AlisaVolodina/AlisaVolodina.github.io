# ================================
# Hugo Configuration File
# ================================

# Website URL & Title
title: 'Мой сайт'
baseURL: 'https://example.com/'

# ================================
# LANGUAGE 
# ================================

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

# Явное объявление языков
languages:
  en:
    languageName: English
    title: 'My Site'
    weight: 1

# ================================
# PAGE OPTIONS
# ================================

cascade:
  - _target:
      path: /blog/**
      kind: page
    pager: true
    editable: true
    hide_date: false
    show_date_updated: true
    reading_time: true
    commentable: true
    show_related: true
    share: true
    show_breadcrumb: false
    header:
      navbar:
        enable: true

# ================================
# CONTENT TYPES & MOUNTS
# ================================

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: assets
      target: assets
    - source: content/projects
      target: content/projects
    - source: assets/media/projects
      target: assets/media/projects

permalinks:
  blog: /blog/:slug/
  projects: /project/:slug/

# ================================
# ADVANCED SETTINGS
# ================================

build:
  writeStats: true
enableGitInfo: false
summaryLength: 30
pagination:
  pagerSize: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [".ipynb_checkpoints$", "\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
disableAliases: true

outputs:
  home: [HTML, RSS, headers, redirects, backlinks]
  section: [HTML, RSS]

imaging:
  resampleFilter: lanczos
  quality: 90
  anchor: smart
  hint: picture

timeout: 600000

taxonomies:
  tag: tags
  category: categories
  author: authors

markup:
  _merge: deep

related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70

security:
  _merge: deep
sitemap:
  _merge: deep
minify:
  _merge: deep
